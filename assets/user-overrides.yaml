modelSelector:
    id: claude-sonnet-4
    vendor: copilot

installExtensions:
    - id: github.copilot-chat
      mode: vsix
      path: /agent/assets/extensions/copilot-chat-0.40.0.vsix

chatMode: Plan
vscodeSettings:
    chat.planAgent.defaultModel: 'claude-sonnet-4'
    github.copilot.chat.implementAgent.model: 'claude-sonnet-4'
    github.copilot.chat.exploreAgent.model: 'claude-sonnet-4'
    github.copilot.chat.planAgent.autoHandoff: true
    chat.tools.global.autoApprove: true
    chat.tools.terminal.autoReplyToPrompts: true
